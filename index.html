<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SUNDAYPLANET47 — Offer Sheet</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px;
      color: #111;
      background: #f0f0f0;
      padding: 24px;
    }

    /* ── Toolbar ─────────────────────────────────────── */
    #toolbar {
      max-width: 960px;
      margin: 0 auto 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    #toolbar button {
      padding: 8px 18px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .04em;
    }
    #toolbar button:hover { background: #333; }
    #toolbar button.btn-add {
      background: #fff;
      color: #111;
      border: 1.5px solid #111;
    }
    #toolbar button.btn-add:hover { background: #f5f5f5; }
    #toolbar .note { font-size: 13px; color: #666; }

    /* ── Sheet card ──────────────────────────────────── */
    .sheet {
      max-width: 960px;
      margin: 0 auto 32px;
      background: #fff;
      padding: 32px 36px 28px;
      border: 1px solid #ddd;
    }

    /* ── Header ──────────────────────────────────────── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
      gap: 16px;
    }
    .logo-wrap { line-height: 0; }
    .logo-img {
      height: 48px;
      width: auto;
      display: block;
      object-fit: contain;
      object-position: left center;
    }
    .logo-text-fallback {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: .04em;
      line-height: 1;
    }
    .brand-sub {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .14em;
      color: #555;
      margin-top: 5px;
      text-transform: uppercase;
    }
    .address {
      font-size: 11.5px;
      color: #555;
      line-height: 1.6;
      margin-top: 3px;
    }
    .sheet-title {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: .12em;
      text-align: right;
      white-space: nowrap;
    }
    .sheet-date { text-align: right; font-size: 12px; color: #666; margin-top: 4px; }

    /* ── Section label ───────────────────────────────── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      background: #111;
      color: #fff;
      padding: 3px 8px;
      margin-bottom: 8px;
      display: inline-block;
    }

    /* ── Buyer info ──────────────────────────────────── */
    .buyer-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 24px;
      margin-bottom: 16px;
    }
    .buyer-field { display: flex; flex-direction: column; gap: 2px; }
    .buyer-field.full { grid-column: 1 / -1; }
    .field-label { font-size: 11px; color: #888; font-weight: 600; letter-spacing: .06em; }
    .field-input {
      border: none;
      border-bottom: 1px solid #ccc;
      padding: 3px 0;
      font-size: 13px;
      outline: none;
      width: 100%;
      background: transparent;
      font-family: inherit;
    }
    .field-input:focus { border-bottom-color: #111; }

    /* ── Order table ─────────────────────────────────── */
    .order-section { margin-bottom: 12px; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: #111;
      color: #fff;
      padding: 5px 4px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .05em;
      text-align: center;
      white-space: nowrap;
    }
    thead th.left { text-align: left; }
    tbody tr:nth-child(even) { background: #f9f9f9; }
    tbody td {
      padding: 2px 3px;
      border-bottom: 1px solid #eee;
      vertical-align: middle;
    }
    td.no {
      text-align: center;
      color: #888;
      font-size: 12px;
      width: 22px;
      font-weight: 600;
    }
    td.divider, th.divider { width: 2px; padding: 0; background: #bbb; }

    /* custom product input wrapper */
    .prod-custom-wrap {
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .prod-custom-wrap input { flex: 1; }
    .back-btn {
      cursor: pointer;
      color: #aaa;
      font-size: 13px;
      padding: 0 2px;
      flex-shrink: 0;
      line-height: 1;
    }
    .back-btn:hover { color: #111; }

    /* inputs inside table */
    td input[type="text"],
    td input[type="number"] {
      border: none;
      background: transparent;
      font-size: 12px;
      width: 100%;
      outline: none;
      padding: 3px 2px;
      font-family: inherit;
      color: #111;
    }
    td input[type="number"] {
      text-align: right;
      -moz-appearance: textfield;
    }
    td input[type="number"]::-webkit-inner-spin-button,
    td input[type="number"]::-webkit-outer-spin-button { display: none; }
    td input[type="text"]:focus,
    td input[type="number"]:focus { background: #fffbe6; }
    td.qty-cell { width: 38px; }
    td.qty-cell input { text-align: center; font-weight: 600; }
    td.price-cell { width: 64px; }
    td.price-cell input { text-align: right; }
    td.subtotal-cell {
      width: 72px;
      text-align: right;
      font-size: 12px;
      padding-right: 5px;
      white-space: nowrap;
      color: #111;
    }

    /* variant select inside table */
    td select {
      border: none;
      background: transparent;
      font-size: 12px;
      width: 100%;
      outline: none;
      padding: 3px 2px;
      font-family: inherit;
      color: #111;
      cursor: pointer;
    }
    td select:focus { background: #fffbe6; }
    optgroup { font-weight: 700; }

    /* ── Totals ──────────────────────────────────────── */
    .totals-wrap { display: flex; justify-content: flex-end; margin-top: 6px; }
    .totals-table { width: 300px; }
    .totals-table td {
      padding: 4px 6px;
      border: none;
      border-bottom: 1px solid #eee;
      font-size: 13px;
    }
    .totals-table td:first-child { color: #555; }
    .totals-table td:last-child { text-align: right; font-weight: 600; white-space: nowrap; }
    .totals-table tr.grand td {
      border-top: 2px solid #111;
      border-bottom: none;
      font-size: 14px;
      font-weight: 700;
    }
    .discount-label { display: flex; align-items: center; gap: 6px; }
    .discount-label input[type="checkbox"] { cursor: pointer; accent-color: #111; }

    /* ── Shipping & Payment ──────────────────────────── */
    .info-table { width: 100%; margin-bottom: 14px; }
    .info-table td {
      padding: 4px 6px;
      border-bottom: 1px solid #eee;
      font-size: 12.5px;
      vertical-align: top;
    }
    .info-table td:first-child {
      width: 180px;
      color: #888;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: .05em;
      text-transform: uppercase;
      white-space: nowrap;
      padding-top: 5px;
    }
    .info-table .editable {
      border: none;
      border-bottom: 1px solid #ccc;
      padding: 2px 0;
      font-size: 12.5px;
      outline: none;
      width: 100%;
      background: transparent;
      font-family: inherit;
    }
    .info-table .editable:focus { border-bottom-color: #111; }
    .info-table .fixed { color: #333; font-size: 12px; line-height: 1.5; }
    .bank-details { font-size: 11.5px; color: #555; line-height: 1.6; margin-top: 2px; }

    /* ── Terms ───────────────────────────────────────── */
    .terms-box {
      border: 1px solid #e0e0e0;
      padding: 10px 14px;
      margin-bottom: 14px;
      background: #fafafa;
    }
    .terms-box p { font-size: 11px; color: #666; line-height: 1.6; margin-bottom: 3px; }
    .terms-box p strong { color: #333; }

    /* ── Signatures ──────────────────────────────────── */
    .sig-block { display: flex; justify-content: space-between; margin-top: 20px; gap: 32px; }
    .sig-col { flex: 1; border-top: 1px solid #111; padding-top: 6px; }
    .sig-col .sig-title { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #555; }
    .sig-col .sig-line { margin-top: 30px; border-top: 1px solid #aaa; font-size: 11px; color: #aaa; padding-top: 3px; text-align: center; }

    /* ── Copy badge ──────────────────────────────────── */
    .copy-badge { text-align: center; font-size: 11px; font-weight: 700; letter-spacing: .16em; color: #999; margin-top: 14px; text-transform: uppercase; }

    /* ── iPad / Tablet ───────────────────────────────── */
    @media screen and (max-width: 1024px) {
      body { padding: 14px; font-size: 14px; }

      .sheet { padding: 24px 18px 20px; }

      /* Bigger touch targets for all table inputs & selects */
      td select,
      td input[type="text"],
      td input[type="number"] {
        font-size: 15px;
        padding: 6px 4px;
        min-height: 36px;
      }

      /* Horizontally scrollable order table */
      .order-section {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        border: 1px solid #eee;
        border-radius: 4px;
      }
      table { min-width: 820px; }

      /* Larger header buttons */
      #toolbar button {
        padding: 11px 22px;
        font-size: 16px;
      }
      #toolbar .note { font-size: 14px; }

      /* Logo */
      .logo-img { height: 40px; }

      /* Buyer info: stack to single column on portrait */
      .buyer-grid { gap: 10px 20px; }
      .field-input { font-size: 16px; padding: 5px 0; }
      .field-label { font-size: 12px; }

      /* Shipping table */
      .info-table td { font-size: 14px; padding: 6px 8px; }
      .info-table td:first-child { font-size: 12px; width: 160px; }
      .info-table .editable { font-size: 15px; }

      /* Totals */
      .totals-table { width: 100%; max-width: 360px; }
      .totals-table td { font-size: 15px; padding: 6px 8px; }

      /* Signature lines: taller for writing room */
      .sig-col .sig-line { margin-top: 40px; }

      /* Section labels */
      .section-label { font-size: 12px; padding: 4px 10px; }

      /* Terms */
      .terms-box p { font-size: 12px; }

      /* Seller copy: collapsible on screen */
      #sheet-seller { display: none; }
      #sheet-seller.visible { display: block; }
    }

    /* Portrait iPad (768px): single-column buyer info */
    @media screen and (max-width: 820px) {
      .buyer-grid { grid-template-columns: 1fr; }
      .buyer-field.full { grid-column: 1; }
      .header { flex-direction: column; gap: 8px; }
      .sheet-title { text-align: left; font-size: 20px; }
    }

    /* Toggle seller copy button */
    #seller-toggle {
      padding: 11px 22px;
      background: #fff;
      color: #111;
      border: 1.5px solid #111;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: .04em;
      display: none;
    }
    @media screen and (max-width: 1024px) {
      #seller-toggle { display: inline-block; }
    }

    /* ── Print: A4 한 페이지 자동 맞춤 ──────────────── */
    @media print {
      @page { size: A4 portrait; margin: 8mm 10mm; }

      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; color: #000 !important; }

      body { background: #fff; padding: 0; font-size: 8px; }
      #toolbar { display: none !important; }
      #sheet-seller { display: block !important; }

      .sheet {
        max-width: 100%;
        width: 100%;
        border: none;
        padding: 0;
        margin: 0;
        page-break-after: always;
      }
      .sheet:last-of-type { page-break-after: auto; }

      /* Header */
      .header { margin-bottom: 6px; }
      .logo-img { height: 28px; }
      .logo-text-fallback { font-size: 18px !important; }
      .brand-sub { font-size: 7px !important; margin-top: 2px; }
      .address { font-size: 7px !important; line-height: 1.4; margin-top: 2px; }
      .sheet-title { font-size: 15px !important; }
      .sheet-date { font-size: 7.5px !important; }

      /* Section labels */
      .section-label { font-size: 7px !important; padding: 2px 5px; margin-bottom: 3px; background: #000 !important; color: #fff !important; }

      /* Buyer info */
      .buyer-grid { gap: 2px 12px; margin-bottom: 6px; }
      .field-label { font-size: 7px !important; }
      .field-input { font-size: 8px !important; padding: 1px 0; border-bottom-color: #aaa !important; }

      /* Order table */
      .order-section { overflow-x: visible; border: none; margin-bottom: 4px; }
      table { min-width: unset; }
      thead th { font-size: 7px !important; padding: 2px 2px; background: #000 !important; color: #fff !important; }
      tbody td { padding: 1px 2px; border-bottom-color: #ccc !important; }
      td.no { font-size: 7.5px !important; width: 16px; }
      td select,
      td input[type="text"],
      td input[type="number"] { font-size: 8px !important; padding: 1px 1px; min-height: unset; }
      td.subtotal-cell { font-size: 8px !important; }
      td.divider, th.divider { background: #000 !important; }
      tbody tr:nth-child(even) { background: #fff !important; }

      /* Totals */
      .totals-wrap { margin-top: 3px; }
      .totals-table { width: 220px; }
      .totals-table td { font-size: 8.5px !important; padding: 2px 4px; }
      .totals-table tr.grand td { font-size: 10px !important; border-top-color: #000 !important; }

      /* Shipping */
      .info-table { margin-bottom: 5px; }
      .info-table td { font-size: 7.5px !important; padding: 2px 4px; border-bottom-color: #ccc !important; }
      .info-table td:first-child { font-size: 7px !important; width: 120px; }
      .info-table .fixed { font-size: 7.5px !important; }
      .bank-details { font-size: 7px !important; }

      /* Terms */
      .terms-box { padding: 4px 8px; margin-bottom: 5px; border-color: #ccc !important; background: #fff !important; }
      .terms-box p { font-size: 6.5px !important; margin-bottom: 1px; }

      /* Signatures */
      .sig-block { margin-top: 6px; gap: 16px; }
      .sig-col { border-top-color: #000 !important; padding-top: 4px; }
      .sig-col .sig-title { font-size: 7px !important; }
      .sig-col .sig-line { margin-top: 16px; font-size: 7px !important; border-top-color: #000 !important; }
      .copy-badge { font-size: 7px !important; margin-top: 5px; }
    }
  </style>
</head>
<body>

<div id="toolbar">
  <button onclick="window.print()">🖨 Print 2 copies</button>
  <button class="btn-add" onclick="addRowPair()">＋ Add Row</button>
  <button id="seller-toggle" onclick="toggleSeller()">Seller Copy 보기</button>
  <span class="note">입력은 위쪽(Buyer Copy)에만 — Seller Copy에 자동 복사됩니다.</span>
</div>

// ════════════════════════════════════════════════════

  { sku:"TR-11",  name:"Tray Eleven",                  cat:"HOUSE",      price:2.65,  variants:["FLORAL","MIDNIGHT","MYSTIC FOG"] },

let maxRow = 24;

function formatUSD(n) {
  return '$' + Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function findProductByName(name) {
  return PRODUCTS.find(p => p.name.toLowerCase() === (name||'').trim().toLowerCase());
}

// Build product <select> options string
const CATS = [...new Set(PRODUCTS.map(p => p.cat))];
function productOptionsHTML() {
  let h = '<option value="">— 선택 —</option><option value="__custom__">✏ Custom product...</option>';
  CATS.forEach(cat => {
    h += `<optgroup label="${cat}">`;
    PRODUCTS.filter(p => p.cat === cat).forEach(p => {
      h += `<option value="${p.sku}">${p.name}</option>`;
    });
    h += '</optgroup>';
  });
  return h;
}

// ── Build a single row cell group ────────────────────
function rowCellsHTML(r, sheetId) {
  return `
    <td class="no">${r}</td>
    <td class="prod-cell">
      <select class="prod-sel" data-row="${r}" data-sheet="${sheetId}">${productOptionsHTML()}</select>
      <div class="prod-custom-wrap" style="display:none">
        <input type="text" class="prod-custom" data-row="${r}" data-sheet="${sheetId}" placeholder="제품명 입력">
        <span class="back-btn" title="목록으로">↩</span>
      </div>
    </td>
    <td>
      <select class="variant-sel" data-row="${r}" data-sheet="${sheetId}">
        <option value="">—</option>
      </select>
    </td>
    <td class="qty-cell"><input type="number" class="qty-inp" data-row="${r}" data-sheet="${sheetId}" min="0" placeholder="0"></td>
    <td class="price-cell"><input type="number" class="price-inp" data-row="${r}" data-sheet="${sheetId}" min="0" step="0.01" placeholder="0.00"></td>
    <td class="subtotal-cell" id="${sheetId}-sub-${r}">—</td>`;
}

// ── Build table rows (pairs) ─────────────────────────
function buildTableRows(sheetId, count) {
  let html = '';
  for (let r = 1; r <= count / 2; r++) {
    const r2 = r + count / 2;
    html += `<tr>${rowCellsHTML(r, sheetId)}<td class="divider"></td>${rowCellsHTML(r2, sheetId)}</tr>`;
  }
  return html;
}

// ── Build full sheet HTML ────────────────────────────
function buildSheet(id, copyLabel) {
  return `
  <div class="sheet" id="${id}">

    <div class="header">
      <div>
        <div class="logo-wrap">
          <img src="pots-logo.png" alt="POTS." class="logo-img"
               onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
          <p class="logo-text-fallback" style="display:none">POTS.</p>
        </div>

<script>
(function () {

  // ── Set date ─────────────────────────────────────────────
  ['sheet-buyer','sheet-seller'].forEach(id => {
    const el = document.getElementById(id + '-date');
    if (el) {
      const d = new Date();
      el.textContent = 'Date: ' + d.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
    }
  });

  // ── Apply product data to a row ──────────────────────────
  function applyProduct(sheetId, row, product) {
    const sheet    = document.getElementById(sheetId);
    const varSel   = sheet.querySelector(`.variant-sel[data-row="${row}"]`);
    const priceInp = sheet.querySelector(`.price-inp[data-row="${row}"]`);

    varSel.innerHTML = '<option value="">—</option>';
    if (product) {
      priceInp.value = product.price.toFixed(2);
      if (product.variants.length > 0) {
        product.variants.forEach(v => {
          const opt = document.createElement('option');
          opt.value = v; opt.textContent = v;
          varSel.appendChild(opt);
        });
        varSel.disabled = false;
      } else {
        varSel.disabled = true;
      }
    } else {
      varSel.disabled = false;
    }
  }

  // ── Switch to custom text input ───────────────────────────
  function switchToCustom(sheet, row) {
    const cell = sheet.querySelector(`.prod-cell:has([data-row="${row}"])`);
    if (!cell) return;
    cell.querySelector('.prod-sel').style.display = 'none';
    cell.querySelector('.prod-custom-wrap').style.display = 'flex';
    cell.querySelector('.prod-custom').focus();
  }

  // ── Switch back to select ─────────────────────────────────
  function switchToSelect(sheet, row) {
    const cell = sheet.querySelector(`.prod-cell:has([data-row="${row}"])`);
    if (!cell) return;
    const sel = cell.querySelector('.prod-sel');
    sel.value = '';
    sel.style.display = '';
    const wrap = cell.querySelector('.prod-custom-wrap');
    wrap.style.display = 'none';
    wrap.querySelector('.prod-custom').value = '';
    applyProduct(sheet.id, row, null);
    recalc(sheet.id);
  }

  // ── Get the displayed product name for a row ──────────────
  function getProductName(sheet, row) {
    const sel = sheet.querySelector(`.prod-sel[data-row="${row}"]`);
    if (sel && sel.style.display !== 'none') {
      const p = PRODUCTS.find(p => p.sku === sel.value);
      return p ? p.name : '';
    }
    const custom = sheet.querySelector(`.prod-custom[data-row="${row}"]`);
    return custom ? custom.value : '';
  }

  // ── Recalculate totals ────────────────────────────────────
  function recalc(sheetId) {
    let sub = 0;
    const sheet = document.getElementById(sheetId);
    // find all qty inputs in this sheet (covers dynamically added rows)
    sheet.querySelectorAll('.qty-inp').forEach(qtyEl => {
      const r      = qtyEl.dataset.row;
      const priceEl = sheet.querySelector(`.price-inp[data-row="${r}"]`);
      const subEl   = document.getElementById(`${sheetId}-sub-${r}`);
      const qty     = parseFloat(qtyEl.value)    || 0;
      const price   = parseFloat(priceEl?.value) || 0;
      const rowSub  = qty * price;
      if (subEl) subEl.textContent = rowSub > 0 ? formatUSD(rowSub) : '—';
      sub += rowSub;
    });

    document.getElementById(`${sheetId}-total-grand`).textContent = formatUSD(sub);
  }

  // ── Sync a single row: buyer → seller ────────────────────
  function syncRow(r) {
    const src = document.getElementById('sheet-buyer');
    const dst = document.getElementById('sheet-seller');

    // Product — check if buyer row is in select or custom mode
    const sSel    = src.querySelector(`.prod-sel[data-row="${r}"]`);
    const dSel    = dst.querySelector(`.prod-sel[data-row="${r}"]`);
    const sCustom = src.querySelector(`.prod-custom[data-row="${r}"]`);
    const dCustom = dst.querySelector(`.prod-custom[data-row="${r}"]`);

    if (sSel && sSel.style.display !== 'none') {
      // select mode
      if (dSel && dSel.value !== sSel.value) {
        dSel.value = sSel.value;
        if (sSel.value && sSel.value !== '__custom__') {
          applyProduct('sheet-seller', r, PRODUCTS.find(p => p.sku === sSel.value));
        }
      }
      // Make sure seller is also in select mode
      if (dSel) dSel.style.display = '';
      if (dCustom) dCustom.closest('.prod-custom-wrap').style.display = 'none';
    } else {
      // custom mode
      if (dSel) dSel.style.display = 'none';
      if (dCustom) {
        dCustom.closest('.prod-custom-wrap').style.display = 'flex';
        dCustom.value = sCustom ? sCustom.value : '';
      }
    }

    // Variant
    const sVar = src.querySelector(`.variant-sel[data-row="${r}"]`);
    const dVar = dst.querySelector(`.variant-sel[data-row="${r}"]`);
    if (sVar && dVar) {
      // Rebuild seller variant options to match buyer
      dVar.innerHTML = sVar.innerHTML;
      dVar.value     = sVar.value;
      dVar.disabled  = sVar.disabled;
    }
    // Qty
    const sQty = src.querySelector(`.qty-inp[data-row="${r}"]`);
    const dQty = dst.querySelector(`.qty-inp[data-row="${r}"]`);
    if (sQty && dQty) dQty.value = sQty.value;
    // Price
    const sPrice = src.querySelector(`.price-inp[data-row="${r}"]`);
    const dPrice = dst.querySelector(`.price-inp[data-row="${r}"]`);
    if (sPrice && dPrice) dPrice.value = sPrice.value;
  }

  function syncBuyerInfo() {
    const src = document.getElementById('sheet-buyer');
    const dst = document.getElementById('sheet-seller');
    ['bi-company','bi-contact','bi-phone','bi-email','bi-addr','bi-delivery','bi-notes'].forEach(cls => {
      const s = src.querySelector('.' + cls);
      const d = dst.querySelector('.' + cls);
      if (s && d) d.value = s.value;
    });
  }

  function fullSync() {
    syncBuyerInfo();
    const src = document.getElementById('sheet-buyer');
    src.querySelectorAll('.qty-inp').forEach(el => syncRow(el.dataset.row));
    recalc('sheet-seller');
  }

  // ── Add Row Pair ─────────────────────────────────────────
  window.addRowPair = function () {
    const r1 = maxRow + 1;
    const r2 = maxRow + 2;
    maxRow += 2;

    ['sheet-buyer','sheet-seller'].forEach(sheetId => {
      const tbody = document.getElementById(sheetId + '-tbody');
      const tr = document.createElement('tr');
      tr.innerHTML = rowCellsHTML(r1, sheetId) +
                     '<td class="divider"></td>' +
                     rowCellsHTML(r2, sheetId);
      tbody.appendChild(tr);

      // Stripe
      const rows = tbody.querySelectorAll('tr');
      rows.forEach((row, i) => {
        row.style.background = i % 2 === 1 ? '#f9f9f9' : '';
      });
    });
  };

  // ── Attach events on buyer sheet ─────────────────────────
  const buyerSheet = document.getElementById('sheet-buyer');

  buyerSheet.addEventListener('change', e => {
    const row = e.target.dataset.row;

    if (e.target.classList.contains('prod-sel')) {
      const sku = e.target.value;
      if (sku === '__custom__') {
        switchToCustom(buyerSheet, row);
        switchToCustom(document.getElementById('sheet-seller'), row);
      } else {
        const product = PRODUCTS.find(p => p.sku === sku);
        applyProduct('sheet-buyer', row, product);
      }
    }

    syncBuyerInfo();
    if (row) syncRow(row);
    recalc('sheet-buyer');
    recalc('sheet-seller');
  });

  buyerSheet.addEventListener('input', e => {
    const row = e.target.dataset.row;
    if (row) syncRow(row);
    recalc('sheet-buyer');
    recalc('sheet-seller');
  });

  // Back button: return from custom to select
  buyerSheet.addEventListener('click', e => {
    if (e.target.classList.contains('back-btn')) {
      const wrap = e.target.closest('.prod-custom-wrap');
      const cell = wrap.closest('td');
      const row  = cell.querySelector('.prod-custom').dataset.row;
      switchToSelect(buyerSheet, row);
      syncRow(row);
      recalc('sheet-buyer');
      recalc('sheet-seller');
    }
  });

  // Initial calc
  recalc('sheet-buyer');
  recalc('sheet-seller');

  // ── Seller Copy toggle (tablet only) ─────────────────────
  window.toggleSeller = function () {
    const seller = document.getElementById('sheet-seller');
    const btn    = document.getElementById('seller-toggle');
    const isVisible = seller.classList.toggle('visible');
    btn.textContent = isVisible ? 'Seller Copy 닫기' : 'Seller Copy 보기';
    if (isVisible) seller.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };
})();
</script>
